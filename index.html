<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WMS PHC — Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1e1b4b, #4338ca);
    }
    .login-card {
      background: #fff;
      padding: 40px;
      border-radius: 16px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    }
    .logo { text-align: center; margin-bottom: 30px; }
    .logo .icon { font-size: 60px; }
    .logo h1 { font-size: 24px; color: #1e1b4b; margin-top: 8px; }
    .logo p { font-size: 13px; color: #64748b; margin-top: 4px; }
    .form-group { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #475569;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      transition: 0.2s;
    }
    input:focus {
      outline: none;
      border-color: #4338ca;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #4338ca;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.2s;
    }
    button:hover { background: #3730a3; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .alert {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 13px;
      display: none;
    }
    .alert-error { background: #fee2e2; color: #991b1b; }
    .alert-success { background: #d1fae5; color: #065f46; }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="logo">
      <div class="icon">🏭</div>
      <h1>WMS Logistic PHC</h1>
      <p>Warehouse Management System</p>
    </div>

    <div class="alert alert-error" id="errorBox"></div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="biansyah@wms.com">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••" onkeypress="if(event.key==='Enter')doLogin()">
    </div>

    <button onclick="doLogin()" id="btnLogin">🔐 Masuk</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBQVypmRmNQKiz_-KFYDKQTY8x-8S9FTR4",
      authDomain: "logistic-system-phc.firebaseapp.com",
      projectId: "logistic-system-phc",
      storageBucket: "logistic-system-phc.firebasestorage.app",
      messagingSenderId: "316718626582",
      appId: "1:316718626582:web:3745ae3bef5df297d00237",
      measurementId: "G-XTDXXKE49R"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Redirect kalau sudah login
    onAuthStateChanged(auth, user => {
      if (user) window.location.href = "dashboard.html";
    });

    window.doLogin = async function() {
      const email = document.getElementById('email').value.trim();
      const pwd = document.getElementById('password').value;
      const btn = document.getElementById('btnLogin');
      const err = document.getElementById('errorBox');

      err.style.display = 'none';

      if (!email || !pwd) {
        err.textContent = '⚠️ Email dan password wajib diisi!';
        err.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = '⏳ Loading...';

      try {
        await signInWithEmailAndPassword(auth, email, pwd);
        btn.textContent = '✅ Berhasil!';
        window.location.href = "dashboard.html";
      } catch (e) {
        btn.disabled = false;
        btn.textContent = '🔐 Masuk';
        err.textContent = '❌ Email atau password salah!';
        err.style.display = 'block';
      }
    };
  </script>

</body>
</html>
